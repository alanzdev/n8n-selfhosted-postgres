name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, vm1]
    environment: n8n selfhosted
    timeout-minutes: 30
    env:
      N8N_ENCRYPTION_KEY: ${{ secrets.N8N_ENCRYPTION_KEY }}
      N8N_RUNNERS_AUTH_TOKEN: ${{ secrets.N8N_RUNNERS_AUTH_TOKEN }}
      RUNNER_TOKEN: ${{ secrets.N8N_RUNNERS_AUTH_TOKEN }}
      N8N_HOST: ${{ vars.N8N_HOST }}
      N8N_SSL_CERT: ${{ vars.N8N_SSL_CERT }}
      N8N_SSL_KEY: ${{ vars.N8N_SSL_KEY }}
      CERT_VOLUMES: ${{ vars.CERT_VOLUMES }}
      POSTGRES_DATABASE: ${{ vars.POSTGRES_DATABASE }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest Docker images
        run: docker compose pull

      - name: Restart services
        run: docker compose up -d --force-recreate --remove-orphans

      - name: Verify services are running
        run: |
          sleep 10
          docker compose ps
